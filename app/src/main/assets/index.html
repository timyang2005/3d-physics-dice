<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1C1C1E">
    <title>3D 骰子</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cannon@0.6.2/build/cannon.min.js"></script>
</head>
<body data-theme="light">
    <div id="scene-container"></div>
    <div class="top-bar">
        <button id="history-btn" class="nav-btn">📋</button>
        <div id="result-display">
            <div id="result-value">-</div>
            <div id="result-label">点数总和</div>
        </div>
        <button id="settings-btn" class="nav-btn">⚙️</button>
    </div>
    <div class="bottom-bar">
        <div class="dice-count">
            <button id="count-minus" class="count-btn">−</button>
            <span id="count-value">1</span>
            <button id="count-plus" class="count-btn">+</button>
        </div>
        <div class="dice-type-selector">
            <button class="type-btn active" data-type="D6">D6</button>
            <button class="type-btn" data-type="D4">D4</button>
            <button class="type-btn" data-type="D8">D8</button>
            <button class="type-btn" data-type="D10">D10</button>
            <button class="type-btn" data-type="D12">D12</button>
            <button class="type-btn" data-type="D20">D20</button>
            <button class="type-btn" data-type="D100">D100</button>
        </div>
        <button id="throw-btn" class="throw-btn">🔀 掷骰子</button>
        <button id="reset-cam-btn" class="cam-btn">🎯</button>
    </div>
    <div id="settings-overlay" class="overlay"></div>
    <div id="settings-panel" class="panel settings-panel">
        <div class="panel-header">
            <span>设置</span>
            <button id="settings-close" class="close-btn">✕</button>
        </div>
        <div class="panel-content">
            <div class="setting-item">
                <label>骰子颜色</label>
                <input type="color" id="dice-color" value="#FFFFFF">
            </div>
            <div class="setting-item">
                <label>自动数字颜色</label>
                <label class="toggle-switch"><input type="checkbox" id="auto-num-color" checked><span class="slider"></span></label>
            </div>
            <div class="setting-item">
                <label>显示总和</label>
                <label class="toggle-switch"><input type="checkbox" id="show-sum" checked><span class="slider"></span></label>
            </div>
            <div class="setting-item">
                <label>音效</label>
                <label class="toggle-switch"><input type="checkbox" id="sound-enabled" checked><span class="slider"></span></label>
            </div>
            <div class="setting-item">
                <label>触觉反馈</label>
                <label class="toggle-switch"><input type="checkbox" id="haptic-enabled" checked><span class="slider"></span></label>
            </div>
            <div class="setting-item">
                <label>模拟速度: <span id="speed-value">1.0x</span></label>
                <input type="range" id="speed-slider" min="0.1" max="5" step="0.1" value="1">
                <button id="speed-reset" class="small-btn">重置</button>
            </div>
            <div class="setting-item">
                <label>深色模式</label>
                <div class="radio-group">
                    <label><input type="radio" name="theme-mode" value="system" checked>跟随系统</label>
                    <label><input type="radio" name="theme-mode" value="light">浅色模式</label>
                    <label><input type="radio" name="theme-mode" value="dark">深色模式</label>
                </div>
            </div>
            <div class="setting-item">
                <label>陀螺仪投掷</label>
                <label class="toggle-switch"><input type="checkbox" id="gyro-enabled"><span class="slider"></span></label>
            </div>
        </div>
    </div>
    <div id="history-overlay" class="overlay"></div>
    <div id="history-panel" class="panel history-panel">
        <div class="panel-header">
            <span>历史记录</span>
            <button id="history-close" class="close-btn">✕</button>
        </div>
        <div class="panel-content">
            <div id="history-list"></div>
            <div style="display:flex;gap:8px;">
                <button id="stats-btn" class="small-btn" style="flex:1;padding:10px;">📊 统计图表</button>
                <button id="clear-history-btn" class="danger-btn" style="flex:1;">清除全部</button>
            </div>
        </div>
    </div>
    <div id="stats-overlay" class="overlay"></div>
    <div id="stats-panel" class="stats-panel">
        <div class="panel-header">
            <span>统计图表</span>
            <button id="stats-close" class="close-btn">✕</button>
        </div>
        <canvas id="stats-chart"></canvas>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
